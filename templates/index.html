  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-focus: #cbd5e1;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-muted: #e0e7ff;
      --danger-dim: #fef2f2;
      --danger: #ef4444;
      --success: #16a34a;
      --warning: #ea580c;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px 16px;
      letter-spacing: -0.02em;
      -webkit-font-smoothing: antialiased;
    }

    @media (min-width: 768px) {
      body {
        padding: 40px 24px;
      }
    }

    .wrapper {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 36px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    @media (min-width: 640px) {
      header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 i {
      color: var(--accent);
    }

    .nav-tabs {
      display: flex;
      gap: 8px;
      width: 100%;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    @media (min-width: 640px) {
      .nav-tabs {
        width: auto;
        gap: 20px;
        padding-bottom: 0;
      }
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--text);
      background-color: var(--border);
    }

    .tab-btn.active {
      color: var(--accent);
      background-color: var(--accent-muted);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.2s ease-out;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    section h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      margin: 0 0 16px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (min-width: 640px) {
      .field-group {
        grid-template-columns: 1.5fr 1.5fr 2fr 0.8fr;
        gap: 16px;
      }
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    input,
    select {
      width: 100%;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px 12px 40px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    button {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background-color: var(--bg);
      border-color: var(--border-focus);
    }

    .btn-danger {
      background-color: transparent;
      color: var(--text-muted);
    }

    .btn-danger:hover {
      color: var(--danger);
      background-color: var(--danger-dim);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
    }

    /* List Containers */
    .list-container {
      border-top: 1px solid var(--border);
      margin-top: 32px;
      padding-top: 24px;
    }

    .list-items {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .list-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    .list-row .item-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .list-row .price {
      color: var(--text-muted);
      margin-right: 12px;
      font-weight: 600;
    }

    .checkout-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      font-size: 1rem;
    }

    .checkout-footer strong {
      font-size: 1.3rem;
      color: var(--text);
    }

    /* Orders Grid Dashboard */
    .orders-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .orders-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .order-block {
      border: 1px solid var(--border);
      background-color: var(--surface);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .order-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .order-price {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--accent);
    }

    .order-meta {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .order-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: auto;
    }

    .order-actions button {
      flex: 1;
      min-width: 70px;
      padding: 8px 10px;
      font-size: 0.82rem;
    }

    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 48px 16px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Modal Sheet Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      padding: 16px;
      box-sizing: border-box;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      transform: scale(0.95);
      transition: transform 0.2s ease;
      box-sizing: border-box;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-header {
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
    }

    .modal-body {
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 4px;
    }

    .modifier-section {
      border-top: 1px solid var(--border);
      margin-top: 14px;
      padding-top: 14px;
    }

    .modifier-search-box {
      margin-bottom: 12px;
    }

    .modifier-search-box input {
      padding-left: 14px;
    }

    .modifier-add-row {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 8px;
      margin-bottom: 16px;
    }

    .modifier-add-row select,
    .modifier-add-row input {
      padding-left: 10px;
      padding-right: 10px;
      height: 40px;
      padding-top: 0;
      padding-bottom: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: auto;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <header>
      <h1><i class="fa-solid fa-utensils"></i>TajInn</h1>
      <div class="nav-tabs">
        <button id="btn-create" class="tab-btn active" onclick="switchTab('create-tab', 'btn-create')">
          <i class="fa-solid fa-plus"></i>Order Desk
        </button>
        <button id="btn-pending" class="tab-btn" onclick="switchTab('pending-tab', 'btn-pending')">
          <i class="fa-solid fa-fire-burner"></i>Pending Queue
        </button>
        <button id="btn-served" class="tab-btn" onclick="switchTab('served-tab', 'btn-served')">
          <i class="fa-solid fa-circle-check"></i>Served Archive
        </button>
      </div>
    </header>

    <div id="create-tab" class="tab-content active">
      <section>
        <h2>New Order Entry</h2>
        <div class="field-group">
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input id="customer" placeholder="Customer name" autocomplete="off">
          </div>
          <div class="input-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="search" placeholder="Filter items..." autocomplete="off">
          </div>
          <div class="input-wrapper">
            <i class="fa-solid fa-list"></i>
            <select id="menu"></select>
          </div>
          <div class="input-wrapper">
            <i class="fa-solid fa-hashtag"></i>
            <input id="quantity" type="number" min="1" value="1" placeholder="Qty">
          </div>
        </div>
        <button class="btn-secondary" onclick="addItem()">
          <i class="fa-solid fa-plus"></i>Add to Cart
        </button>

        <div class="list-container">
          <h2>Current Cart</h2>
          <ul id="cart" class="list-items"></ul>

          <div class="checkout-footer">
            <span><i class="fa-solid fa-receipt"></i>Total Due</span>
            <strong>₹<span id="total">0</span></strong>
          </div>
          <button class="btn-primary btn-submit" onclick="saveOrder()">
            <i class="fa-solid fa-paper-plane"></i>Dispatch to Kitchen
          </button>
        </div>
      </section>
    </div>

    <div id="pending-tab" class="tab-content">
      <section>
        <h2>Active Kitchen Orders</h2>
        <div id="pending-orders" class="orders-grid"></div>
      </section>
    </div>

    <div id="served-tab" class="tab-content">
      <section>
        <h2>Completed Order History</h2>
        <div id="served-orders" class="orders-grid"></div>
      </section>
    </div>
  </div>

  <div id="modifier-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3 class="modal-title">Modify Order Records</h3>
      </div>
      <div class="modal-body">
        <div style="margin-bottom: 14px;">
          <label
                                                                                                                                  style="font-size:0.8rem; font-weight:700; color:var(--text-muted); display:block; margin-bottom:6px;">CUSTOMER
            DESIGNATION</label>
          <div class="modifier-search-box"><input id="mod-customer-name" type="text" placeholder="Customer Name"></div>
        </div>

        <label
                                                                                                                                style="font-size:0.8rem; font-weight:700; color:var(--text-muted); display:block; margin-bottom:6px;">CURRENT
          INVOICED DISHES</label>
        <ul id="mod-current-items" class="list-items"
                                                                                                                                style="max-height:160px; overflow-y:auto; margin-bottom:16px; border-bottom:1px solid var(--border);">
        </ul>

        <div class="modifier-section">
          <label
                                                                                                                                  style="font-size:0.8rem; font-weight:700; color:var(--accent); display:block; margin-bottom:6px;">APPEND
            MORE DISHES</label>
          <div class="modifier-search-box">
            <input id="mod-menu-search" type="text" placeholder="Search menu database...">
          </div>
          <div class="modifier-add-row">
            <select id="mod-menu-select"></select>
            <input id="mod-menu-qty" type="number" min="1" value="1" placeholder="Qty">
            <button class="btn-primary" onclick="addDishToModalTarget()" style="height:40px;"><i
                                                                                                                                      class="fa-solid fa-plus"></i></button>
          </div>
        </div>

        <div class="checkout-footer" style="margin-top:14px; padding-top:10px; border-top:1px solid var(--border);">
          <span style="font-weight:600;">Updated Total:</span>
          <strong>₹<span id="mod-calculated-total">0</span></strong>
        </div>
      </div>
      <div class="modal-actions">
        <button id="mod-cancel-btn" class="btn-secondary" onclick="closeModifierModal()">Cancel</button>
        <button id="mod-save-btn" class="btn-primary">Save Modifications</button>
      </div>
    </div>
  </div>

const menuSelect = document.getElementById("menu");

function switchTab(tabId, btnId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.getElementById(btnId).classList.add('active');
}

function renderMenuOptions(list, targetElement){
    targetElement.innerHTML = "";
    list.forEach(i => targetElement.innerHTML += `<option value="${i[1]}">${i[0]} — ₹${i[1]}</option>`);
}
renderMenuOptions(menuItems, menuSelect);

document.getElementById("search").oninput = e => {
    renderMenuOptions(menuItems.filter(i => i[0].toLowerCase().includes(e.target.value.toLowerCase())), menuSelect);
};

const modalSelectElement = document.getElementById("mod-menu-select");
renderMenuOptions(menuItems, modalSelectElement);

document.getElementById("mod-menu-search").oninput = e => {
    renderMenuOptions(menuItems.filter(i => i[0].toLowerCase().includes(e.target.value.toLowerCase())), modalSelectElement);

function addItem(){
    if(menuSelect.selectedIndex === -1) return;
    let o = menuSelect.options[menuSelect.selectedIndex];
    let qtyInput = document.getElementById("quantity");
    let qty = parseInt(qtyInput.value) || 1;
    if(qty < 1) qty = 1;

    let name = o.text.split(" — ")[0];
    let price = Number(o.value);

    let existingItem = cart.find(item => item.name === name);
    if(existingItem) {
        existingItem.quantity += qty;
    } else {
        cart.push({name: name, price: price, quantity: qty});
    }

    total += price * qty;
    updateCart();
    qtyInput.value = 1;
}

function updateCart(){
    const cartEl = document.getElementById("cart");
    if(cart.length === 0) {
        cartEl.innerHTML = `<li class="empty-state"><i class="fa-solid fa-basket-shopping"></i>Your cart is empty</li>`;
    } else {
        cartEl.innerHTML = cart.map((i, n) => `
            <li class="list-row">
                <div class="item-left">
                    <i class="fa-solid fa-circle-dot" style="color: var(--accent);"></i>
                    <span>${i.name} <strong style="color: var(--accent); margin-left: 4px;">x${i.quantity}</strong></span>
                </div>
                <div>
                    <span class="price">₹${i.price * i.quantity}</span>
                    <button class="btn-danger" onclick="removeItem(${n})"><i class="fa-solid fa-trash"></i></button>
                </div>
            </li>
        `).join("");
    }
    document.getElementById("total").innerText = total;
}
updateCart();

function removeItem(index){
    total -= (cart[index].price * cart[index].quantity);
    cart.splice(index, 1);
    updateCart();
}

async function saveOrder(){
    let customer = document.getElementById("customer").value.trim();
    if(!customer || !cart.length) return; 
    
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customer, items: cart, total })
        });
        
        if(response.ok) {
            cart = []; total = 0;
            updateCart();
            document.getElementById("customer").value = "";
            await loadOrders();
            switchTab('pending-tab', 'btn-pending');
        }
    } catch (err) {
        alert("Database connection dropped. Order could not be created.");
    }
}

function launchOrderModifier(id) {
    let order = cachedOrdersGlobal.find(o => o.id === id);
    if(!order) return;

    currentEditingOrderId = id;
    currentEditingOrderItems = JSON.parse(JSON.stringify(order.items)); 
    currentEditingOrderStatus = order.status;
    
    document.getElementById("mod-customer-name").value = order.customer;
    document.getElementById("mod-menu-search").value = "";
    renderMenuOptions(menuItems, modalSelectElement); 
    
    renderModalItemsList();
    document.getElementById("modifier-modal").classList.add("active");

    document.getElementById("mod-save-btn").onclick = async () => {
        let finalCustomer = document.getElementById("mod-customer-name").value.trim();
        if(!finalCustomer || currentEditingOrderItems.length === 0) return;

        let finalTotal = currentEditingOrderItems.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);

        try {
            const response = await fetch(`${API_URL}/${currentEditingOrderId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customer: finalCustomer,
                    items: currentEditingOrderItems,
                    total: finalTotal,
                    status: currentEditingOrderStatus
                })
            });
            if(response.ok) {
                closeModifierModal();
                await loadOrders();
            }
        } catch(err) {
            alert("Error syncing updates with the central SQLite database.");
        }
    };
}

function closeModifierModal() {
    document.getElementById("modifier-modal").classList.remove("active");
    currentEditingOrderId = null;
    currentEditingOrderItems = [];
}

function renderModalItemsList() {
    const listContainer = document.getElementById("mod-current-items");
    if(currentEditingOrderItems.length === 0) {
        listContainer.innerHTML = `<li class="empty-state" style="padding:20px; font-size:0.85rem;">No remaining items in order array</li>`;
    } else {
        listContainer.innerHTML = currentEditingOrderItems.map((item, index) => `
            <li class="list-row" style="padding: 8px 0;">
                <div class="item-left">
                    <span>${item.name} <strong style="color:var(--accent);">x${item.quantity}</strong></span>
                </div>
                <div>
                    <span class="price" style="font-size:0.85rem;">₹${item.price * item.quantity}</span>
                    <button class="btn-danger" style="padding:4px 8px;" onclick="removeDishFromModalTarget(${index})"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </li>
        `).join("");
    }
    
    let activeTotal = currentEditingOrderItems.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    document.getElementById("mod-calculated-total").innerText = activeTotal;
}

function addDishToModalTarget() {
    if(modalSelectElement.selectedIndex === -1) return;
    let selectedOption = modalSelectElement.options[modalSelectElement.selectedIndex];
    let qty = parseInt(document.getElementById("mod-menu-qty").value) || 1;
    if(qty < 1) qty = 1;

    let dishName = selectedOption.text.split(" — ")[0];
    let dishPrice = Number(selectedOption.value);

    let existingItem = currentEditingOrderItems.find(i => i.name === dishName);
    if(existingItem) {
        existingItem.quantity += qty;
    } else {
        currentEditingOrderItems.push({ name: dishName, price: dishPrice, quantity: qty });
    }

    document.getElementById("mod-menu-qty").value = 1;
    renderModalItemsList();
}

function removeDishFromModalTarget(index) {
    currentEditingOrderItems.splice(index, 1);
    renderModalItemsList();
}

async function completeOrder(id){
    try {
        const response = await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: "Completed" })
        });
        if(response.ok) {
            await loadOrders();
            switchTab('served-tab', 'btn-served');
        }
    } catch(err) {
        console.error(err);
    }
}

async function deleteOrder(id){
    try {
        const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        if(response.ok) {
            await loadOrders();
        }
    } catch (err) {
        alert("Could not process record deletion from database file.");
    }
}

                .meta-section { display: flex; justify-content: space-between; padding: 24px 0; font-size: 14px; line-height: 1.6; }

async function loadOrders(){
    try {
        const response = await fetch(API_URL);
        if(!response.ok) return;
        
        const orders = await response.json();
        cachedOrdersGlobal = orders; 

        let pendingContainer = document.getElementById("pending-orders");
        let servedContainer = document.getElementById("served-orders");

        let pendingHTML = "";
        let servedHTML = "";

        [...orders].reverse().forEach(o => {
            let itemsList = o.items.map(x => `${x.name} (x${x.quantity || 1})`).join(", ");

            if(o.status === "Pending") {
                pendingHTML += `
                <div class="order-block">
                    <div>
                        <div class="order-header">
                            <h3 class="order-title"><i class="fa-regular fa-user"></i>${o.customer}</h3>
                            <span class="order-price">₹${o.total}</span>
                        </div>
                        <div class="order-meta"><strong>Items:</strong> ${itemsList}</div>
                    </div>
                    <div class="order-actions">
                        <button class="btn-primary" onclick="completeOrder(${o.id})"><i class="fa-solid fa-check"></i>Serve</button>
                        <button class="btn-secondary" onclick="launchOrderModifier(${o.id})"><i class="fa-solid fa-pen-to-square"></i>Edit</button>
                        <button class="btn-secondary" onclick="printOrderReceipt(${o.id})"><i class="fa-solid fa-print"></i>Print</button>
                        <button class="btn-danger" onclick="deleteOrder(${o.id})"><i class="fa-solid fa-trash-can"></i>Drop</button>
                    </div>
                </div>`;
            } else if(o.status === "Completed") {
                servedHTML += `
                <div class="order-block" style="opacity: 0.85; background: #f1f5f9;">
                    <div>
                        <div class="order-header">
                            <h3 class="order-title"><i class="fa-solid fa-user-check" style="color:var(--success);"></i>${o.customer}</h3>
                            <span class="order-price" style="color: var(--text)">₹${o.total}</span>
                        </div>
                        <div class="order-meta"><strong>Items:</strong> ${itemsList}</div>
                    </div>
                    <div class="order-actions">
                        <button class="btn-secondary" style="background:#fff;" onclick="launchOrderModifier(${o.id})"><i class="fa-solid fa-sliders"></i>Modify</button>
                        <button class="btn-secondary" style="background:#fff;" onclick="printOrderReceipt(${o.id})"><i class="fa-solid fa-print"></i>Print</button>
                        <button class="btn-danger" onclick="deleteOrder(${o.id})"><i class="fa-solid fa-circle-minus"></i>Delete</button>
                    </div>
                </div>`;
            }
        });

        pendingContainer.innerHTML = pendingHTML || `<div class="empty-state" style="grid-column:1/-1;"><i class="fa-solid fa-square-poll-horizontal"></i>No active kitchen orders</div>`;
        servedContainer.innerHTML = servedHTML || `<div class="empty-state" style="grid-column:1/-1;"><i class="fa-solid fa-clock-rotate-left"></i>No served records tracked yet</div>`;
    } catch(err) {
        console.error("Could not reach backend database streaming server.", err);
    }
}

loadOrders();
  </script>
